<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0A0A0A; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Arial Black', sans-serif; overflow: hidden; }
  .border { position: absolute; inset: 20px; border: 3px solid #00AAFF; border-radius: 16px; }
  .logo { font-size: 120px; font-weight: 900; color: #F0F0F0; letter-spacing: -4px; line-height: 1; }
  .logo span { color: #00AAFF; }
  .tagline { font-size: 36px; font-weight: 400; letter-spacing: 12px; color: #FFB800; margin-top: 20px; text-transform: uppercase; }
  .dot { width: 16px; height: 16px; background: #FFB800; border-radius: 50%; margin: 40px auto 0; }
  .sub { font-size: 28px; color: #888; letter-spacing: 4px; margin-top: 20px; font-weight: 400; }
</style>
</head>
<body>
  <div class="border"></div>
  <div class="logo">RESELL<span>IQ</span></div>
  <div class="tagline">Track · Flip · Win</div>
  <div class="dot"></div>
  <div class="sub">reselliq.io</div>
</body>
</html>
